services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Nessuna porta esposta all'esterno: accessibile solo nella rete Docker.
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redisdata:/data

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: inventory_app
      POSTGRES_USER: inventory_app
      POSTGRES_PASSWORD: inventory_app
    # Security: do not expose Postgres outside the Docker network by default.
    # If you need psql from the host in dev, prefer `docker compose exec db psql ...`
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - ./.env
    environment:
      # Dev convenience: run migrations automatically at container start.
      # In production, set RUN_MIGRATIONS=0 and run migrations as a controlled deploy step.
      RUN_MIGRATIONS: "1"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - staticfiles:/app/staticfiles
      - media:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5).getcode() == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  backend_nginx:
    image: nginx:1.27-alpine
    ports:
      - "6382:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/api/health/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - ./nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/static:ro
      - media:/media:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "6383:80"
    depends_on:
      backend_nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
  redisdata:
  staticfiles:
  media:
