[mypy]
python_version = 3.12
warn_unused_ignores = True
warn_redundant_casts = True
warn_unreachable = True
no_implicit_optional = True
disallow_untyped_defs = False
check_untyped_defs = False
ignore_missing_imports = True
show_error_codes = True

# Django projects contain a lot of generated / framework-driven code patterns
# (migrations, DRF viewset class attrs, etc.). Keep the signal-to-noise ratio
# high for now.
allow_untyped_globals = True

# Migrations are auto-generated; excluding them avoids constant churn.
exclude = (.*migrations/.*)

# Limit scope to project apps
files = audit, config, core, crm, custom_fields, drive, inventory, issues, maintenance, wiki

# Third-party libs without typing information (py.typed / stubs)
# We keep mypy useful elsewhere, but silence this specific, known case.
[mypy-wiki.api]
disable_error_code = import-untyped
