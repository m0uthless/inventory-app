# Nginx reverse proxy for Django backend + static/media serving.
# DEV friendly, PROD safer defaults.
#
# Notes:
# - Rate limiting is applied to auth endpoints to mitigate brute-force.
# - Drive media direct access is blocked; downloads must go through authenticated API.
# - When running behind Caddy in production, preserve the original X-Forwarded-Proto
#   so Django can correctly detect HTTPS via SECURE_PROXY_SSL_HEADER.
# - Docker service discovery can change the backend container IP after a recreate.
#   Use Docker's internal DNS resolver and a variable-based proxy_pass so Nginx
#   can re-resolve the backend name instead of requiring a manual recreate.

# ---------------------------
# Rate limiting zones (http context)
# ---------------------------
# 5 requests/minute per IP to login endpoint (burst allows short spikes)
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;

# Generic API limiter (tune as needed). Apply only to sensitive endpoints if it becomes noisy.
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;

# Preserve X-Forwarded-Proto received from the upstream reverse proxy (Caddy).
# Fallback to the local scheme when the header is absent, which keeps local probes working.
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;

    # Docker embedded DNS for service-name resolution inside the compose network.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Keep proxy_pass dynamic so a recreated backend container can be resolved again.
    set $backend_upstream http://backend:8000;

    # Align with backend upload limits (Drive)
    client_max_body_size 25m;

    # ---------------------------
    # Security headers (safe defaults)
    # ---------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---------------------------
    # Static files
    # ---------------------------
    location /static/ {
        alias /static/;
        autoindex off;
        access_log off;
        expires 7d;
    }

    # ---------------------------
    # Media
    # ---------------------------
    # Prevent bypassing protected media ACLs via direct media URLs
    location ^~ /api/media/drive/ { return 404; }
    location ^~ /media/drive/ { return 404; }

    location ^~ /api/media/wiki_attachments/ { return 404; }
    location ^~ /media/wiki_attachments/ { return 404; }

    location ^~ /api/media/report_request_screenshots/ { return 404; }
    location ^~ /media/report_request_screenshots/ { return 404; }

    location ^~ /api/media/maintenance_events/ { return 404; }
    location ^~ /media/maintenance_events/ { return 404; }

    location ^~ /api/media/device_wifi/ { return 404; }
    location ^~ /media/device_wifi/ { return 404; }

    # Public media (avatars, etc.)
    # Keep both /media/ and /api/media/ for compatibility with current routing.
    location /media/ {
        alias /media/;
        autoindex off;
    }

    location /api/media/ {
        alias /media/;
        autoindex off;
    }

    # Optional internal location for X-Accel-Redirect (future optimization)
    location ^~ /protected_media/ {
        internal;
        alias /media/;
        autoindex off;
    }

    # ---------------------------
    # Auth endpoints (rate limited)
    # ---------------------------
    # Login is the primary brute-force target.
    location = /api/auth/login/ {
        limit_req zone=login_zone burst=10 nodelay;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout  10s;
        proxy_send_timeout    130s;
        proxy_read_timeout    130s;
    }

    # Apply a milder limiter to the whole auth namespace (optional, but useful)
    location ^~ /api/auth/ {
        limit_req zone=api_zone burst=30 nodelay;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout  10s;
        proxy_send_timeout    130s;
        proxy_read_timeout    130s;
    }

    # ---------------------------
    # API + Django admin
    # ---------------------------
    location / {
        proxy_pass $backend_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout aligned to gunicorn --timeout 120 (+ margin)
        proxy_connect_timeout  10s;
        proxy_send_timeout    130s;
        proxy_read_timeout    130s;

        # For larger responses / streaming
        proxy_buffering off;
    }
}
